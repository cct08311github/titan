global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: ['alertname', 'job', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-webhook
      continue: true
    - matchers:
        - severity = "warning"
      receiver: warning-webhook
      continue: true

receivers:
  - name: default-log

  - name: critical-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/critical'
        send_resolved: true
        max_alerts: 20

  - name: warning-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/warning'
        send_resolved: true
        max_alerts: 20

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']
