global:
  resolve_timeout: 5m
  # Email SMTP — configure in .env: SMTP_HOST, SMTP_FROM, ALERT_EMAIL_TO
  smtp_smarthost: '${SMTP_HOST:?需設定 SMTP_HOST}:${SMTP_PORT:-587}'
  smtp_from: '${SMTP_FROM:-titan-alerts@titan.local}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'
  smtp_require_tls: false

route:
  receiver: default-email
  group_by: ['alertname', 'job', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-email
      repeat_interval: 30m
      continue: true
    - matchers:
        - severity = "warning"
      receiver: warning-email
      repeat_interval: 4h
      continue: true

receivers:
  - name: default-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN] {{ .Status | toUpper }} - {{ .GroupLabels.alertname }}'

  - name: critical-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN 緊急] {{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'

  - name: warning-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN 警告] {{ .GroupLabels.alertname }}'

  # Webhook backup (optional — configure if webhook receiver available)
  - name: critical-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/critical'
        send_resolved: true
        max_alerts: 20

  - name: warning-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/warning'
        send_resolved: true
        max_alerts: 20

  # ══════════════════════════════════════════════════════════════
  # Slack 通知範例（取消註解並填入實際 Webhook URL 即可啟用）
  # 申請 Slack Incoming Webhook：
  #   https://api.slack.com/messaging/webhooks
  # ══════════════════════════════════════════════════════════════
  # - name: critical-slack
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '#titan-alerts'
  #       title: '[TITAN 緊急] {{ .GroupLabels.alertname }}'
  #       text: |
  #         *狀態*: {{ .Status | toUpper }}
  #         *告警*: {{ .GroupLabels.alertname }}
  #         *實例*: {{ .GroupLabels.instance }}
  #         *摘要*: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
  #       color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
  #       send_resolved: true
  #
  # - name: warning-slack
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '#titan-alerts'
  #       title: '[TITAN 警告] {{ .GroupLabels.alertname }}'
  #       text: |
  #         *狀態*: {{ .Status | toUpper }}
  #         *告警*: {{ .GroupLabels.alertname }}
  #         *摘要*: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
  #       send_resolved: true
  #
