global:
  resolve_timeout: 5m
  # Email SMTP — configure in .env: SMTP_HOST, SMTP_FROM, ALERT_EMAIL_TO
  smtp_smarthost: '${SMTP_HOST:?需設定 SMTP_HOST}:${SMTP_PORT:-587}'
  smtp_from: '${SMTP_FROM:-titan-alerts@titan.local}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'
  smtp_require_tls: false

route:
  receiver: default-email
  group_by: ['alertname', 'job', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-email
      repeat_interval: 30m
      continue: true
    - matchers:
        - severity = "critical"
      receiver: critical-webhook
      repeat_interval: 30m
      continue: false
    - matchers:
        - severity = "warning"
      receiver: warning-email
      repeat_interval: 4h
      continue: true
    - matchers:
        - severity = "warning"
      receiver: warning-webhook
      repeat_interval: 4h
      continue: false

receivers:
  - name: default-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN] {{ .Status | toUpper }} - {{ .GroupLabels.alertname }}'

  - name: critical-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN 緊急] {{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'

  - name: warning-email
    email_configs:
      - to: '${ALERT_EMAIL_TO:?需設定 ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[TITAN 警告] {{ .GroupLabels.alertname }}'

  # Webhook receivers — 確保告警即使 Email 故障也能透過 webhook 送達
  # 設定 ALERT_WEBHOOK_URL 環境變數指向實際的 webhook 端點（Slack incoming webhook / n8n / custom）
  - name: default-webhook
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://host.docker.internal:8088/webhooks/alerts/default}'
        send_resolved: true
        max_alerts: 20

  - name: critical-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/critical'
        send_resolved: true
        max_alerts: 20

  - name: warning-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8088/webhooks/alerts/warning'
        send_resolved: true
        max_alerts: 20

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']
