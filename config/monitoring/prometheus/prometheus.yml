# TITAN Prometheus 配置
# 任務: T18 — 日誌與監控建置
# 檔案: config/monitoring/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'titan'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

# ═══════════════════════════════════════════════════════════
# Scrape 配置
# ═══════════════════════════════════════════════════════════
scrape_configs:

  # ── Prometheus 自我監控 ─────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── 主機層監控：node-exporter ────────────────────────────
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          type: 'host'

  # ── 容器監控：cAdvisor ───────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          type: 'container'

  # ── PostgreSQL 監控 ─────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          type: 'database'

  # ── Redis 監控 ───────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          type: 'cache'

  # ── MinIO 監控（S3 API）─────────────────────────────────
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
        labels:
          type: 'storage'

  # ── TITAN App 監控（Issue #195）──────────────────────────
  - job_name: 'titan-app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['titan-app:3000']
        labels:
          type: 'application'
          app: 'titan'

  # ── Outline 服務監控 ────────────────────────────────────
  - job_name: 'outline'
    static_configs:
      - targets: ['outline:3000']
        labels:
          type: 'application'
