# ═══════════════════════════════════════════════════════════════════════════════
# TITAN Nginx 反向代理設定
# Issue #1056 — Nginx 反向代理 + TLS + 路由
# Issue #1329 — 合併 config/nginx/nginx.conf 安全強化設定
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日誌格式（含上游回應時間）────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # 隱藏 Nginx 版本號（安全強化）
    server_tokens off;

    # ── Gzip 壓縮 ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── 速率限制區域定義 ───────────────────────────────────────────────────────
    # 一般存取：每個 IP 每秒最多 20 個請求，允許突發至 50
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # 靜態資源：每個 IP 每秒最多 50 個請求（CSS/JS/圖片）
    limit_req_zone $binary_remote_addr zone=static:10m  rate=50r/s;
    # API 端點：嚴格限制每個 IP 每秒最多 10 個請求
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;

    # ── HTTPS 設定 ────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    # ECDHE-優先加密套件（銀行業安全要求）
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling（憑證撤銷快速檢查）────────────────────────────────────
    # 注意：自簽憑證環境下 stapling 無效，但設定不影響運作；
    #       正式憑證（銀行內部 CA）上線後自動生效。
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            127.0.0.1 valid=300s;
    resolver_timeout    5s;

    # ── HTTP → HTTPS 轉址 ─────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # 速率限制
        limit_req zone=general burst=20 nodelay;

        # 健康檢查端點（不重導向）
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        return 301 https://$host$request_uri;
    }

    # ── 主要 HTTPS 虛擬主機 ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name titan.bank.local mac-mini.tailde842d.ts.net localhost;

        # 通用安全 headers
        # 注意：CSP 由 Next.js middleware 處理，不在此設定
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=()" always;

        # 速率限制（全域）
        limit_req zone=general burst=50 nodelay;

        # 統一錯誤頁面
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ── Nginx 狀態端點（監控系統使用）──────────────────────────────────
        location = /nginx-status {
            stub_status on;
            access_log  off;
            # 僅允許內部網路查詢（Docker 內網段）
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny  all;
        }

        # ── SSE 通知串流（Issue #1322）────────────────────────────────────────
        # 必須在根路徑 location 之前宣告（nginx 精確路徑優先）。
        # 關閉緩衝以確保事件即時送達；proxy_read_timeout 設為 24h 讓長連線存活。
        location /api/notifications/stream {
            proxy_pass http://titan-app:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE 不使用 WebSocket upgrade — 清除 Connection header
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
            chunked_transfer_encoding off;
        }

        # ── TITAN API（獨立限速）─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://titan-app:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── TITAN App（根路徑，直接代理）─────────────────────────────────────
        location / {
            proxy_pass http://titan-app:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support（Next.js HMR / SSE）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── MinIO Console（/minio-console 路徑）─────────────────────────────
        location /minio-console/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://titan-minio:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 不緩衝（大檔案上傳）
            proxy_buffering         off;
            proxy_request_buffering off;
            client_max_body_size    100m;
        }

        # ── AI Trader API（/ai-trader/api → FastAPI backend）────────────────────
        # Security (#1319): proxy target is host.docker.internal (local Docker bridge),
        # a trust boundary equivalent to loopback. TLS adds no meaningful protection
        # between the nginx container and the host process on the same machine, and
        # the self-signed cert on :8080 would require `proxy_ssl_verify off` (MITM risk).
        # Use plain HTTP to eliminate the false-security of unverified TLS.
        location /ai-trader/api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://host.docker.internal:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ── AI Trader 前端（/ai-trader 路徑，直接代理）─────────────────────────
        location /ai-trader/ {
            proxy_pass http://host.docker.internal:3012/ai-trader/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── Nginx 健康檢查端點（僅允許本地）─────────────────────────────────
        location /nginx-health {
            access_log off;
            if ($remote_addr != 127.0.0.1) {
                return 403;
            }
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }
    }

    # ── Outline Wiki 獨立虛擬主機（:8443）─────────────────────────────────
    # Outline 不支援 sub-path 部署，用獨立 port 避免路徑衝突
    server {
        listen 8443 ssl;
        listen [::]:8443 ssl;
        http2 on;
        server_name titan.bank.local mac-mini.tailde842d.ts.net localhost;

        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=()" always;

        # 允許 TITAN 主站 iframe 嵌入 Outline（跨 port = 跨 origin）
        proxy_hide_header X-Frame-Options;
        # 替換 Outline 自帶 CSP（URL env 為 localhost，會阻擋外部主機）
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src 'self' https://titan.bank.local https://mac-mini.tailde842d.ts.net https://localhost:443; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https://titan.bank.local https://mac-mini.tailde842d.ts.net https://localhost:443; frame-ancestors https://titan.bank.local https://mac-mini.tailde842d.ts.net https://localhost" always;

        location / {
            proxy_pass http://titan-outline:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket（Outline realtime collaboration）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            client_max_body_size 50m;
        }
    }
}
