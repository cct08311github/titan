# Nginx Configuration for TITAN Platform
# Task: T08 - Nginx Reverse Proxy & TLS

# ═══════════════════════════════════════════════════════════
# 運行環境
# ═══════════════════════════════════════════════════════════
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日誌格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 效能優化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 壓縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 上遊服務器（Docker 容器）
    upstream homepage_backend {
        server homepage:3000;
    }

    upstream outline_backend {
        server outline:3000;
    }

    upstream minio_api_backend {
        server minio:9000;
    }

    upstream minio_console_backend {
        server minio:9001;
    }

    upstream plane_backend {
        server plane-proxy:80;
    }

    # HTTP 伺服器（重導向至 HTTPS）
    server {
        listen 80;
        server_name titan.local;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 自動重導向至 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 伺服器
    server {
        listen 443 ssl http2;
        server_name titan.local;

        # SSL 憑證配置
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        
        # SSL 安全設定
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 統一錯誤頁面
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ═══════════════════════════════════════════════════
        # 路由配置
        # ═══════════════════════════════════════════════════

        # ── Homepage 統一儀表板 ─────────────────────────────
        location / {
            proxy_pass http://homepage_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支援（如需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeout 設定
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Health check
            health_check interval=30s fails=3 passes=2 uri=/;
        }

        # ── Outline 知識庫 ─────────────────────────────────
        location /outline/ {
            proxy_pass http://outline_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Outline 需要正確的 Base URL
            proxy_set_header X-Forwarded-Prefix /outline;
            
            # WebSocket 支援
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeout
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ═══════════════════════════════════════════════════
        # MinIO S3 API 與 Console
        # ═══════════════════════════════════════════════════

        # ── MinIO Console ──────────────────────────────────
        location /minio/ {
            proxy_pass http://minio_console_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket 支援
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeout
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── MinIO S3 API ───────────────────────────────────
        location /minio-api/ {
            proxy_pass http://minio_api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # S3 API 需要保持原 Headers
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Set-Cookie;
            
            # 不緩存
            proxy_buffering off;
            
            # Timeout - S3 上傳可能較慢
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ═══════════════════════════════════════════════════
        # Plane 專案管理
        # ═══════════════════════════════════════════════════

        # ── Plane 路由 ─────────────────────────────────────
        location /plane/ {
            proxy_pass http://plane_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /plane;
            
            # WebSocket 支援
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeout
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ═══════════════════════════════════════════════════
        # SSL/TLS Health Check
        # ═══════════════════════════════════════════════════

        # Nginx status（監控用）
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}