# TITAN 容器平台 — 生產就緒版本
# 任務: T06 — OS 基線與 Harden 設定
# 任務: T07 — Container Platform Setup / T09 — 資料庫與儲存規劃
# 所有映像版本均固定，適用於隔離網路（air-gapped）部署
# 若需更新版本，請同步更新 .env.example 中的備註

version: '3.8'

# ═══════════════════════════════════════════════════════════
# 安全強化：預設不使用 root 使用者執行容器
# ═══════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════
# 服務定義
# ═══════════════════════════════════════════════════════════
services:

  # ── 資料層：PostgreSQL 16 ────────────────────────────────
  # 共用資料庫，供 Outline 及未來服務使用
  # 版本固定：postgres:16-alpine（隔離網路相容）
  postgres:
    image: postgres:16-alpine
    container_name: titan-postgres
    restart: unless-stopped
    # 安全強化：使用最小權限的 postgres 使用者
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-titan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-titan}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init:/docker-entrypoint-initdb.d:ro
    # 安全強化：移除外部端口，僅允許內部網路訪問
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - titan-internal
    # 安全強化：Resource limits（銀行業資安要求）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-titan} -d ${POSTGRES_DB:-titan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 快取層：Redis 7 ──────────────────────────────────────
  # 快取與非同步任務佇列（供 Outline 使用）
  redis:
    image: redis:7-alpine
    container_name: titan-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    # 安全強化：使用 redis 使用者執行
    user: redis
    volumes:
      - redis-data:/data
    # 安全強化：移除外部端口，僅允許內部網路訪問
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    networks:
      - titan-internal
    # 安全強化：Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 物件儲存：MinIO ──────────────────────────────────────
  # S3 相容物件儲存，供 Outline 附件使用
  # 版本固定：RELEASE.2024-01-01T00-00-00Z（適合隔離網路）
  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: titan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # 安全強化：使用 minio 使用者執行
    user: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    # 安全強化：移除外部端口，僅允許內部網路訪問（外部存取透過 Nginx Proxy）
    # ports:
    #   - "${MINIO_API_PORT:-9000}:9000"
    #   - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - titan-internal
    # 安全強化：Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  # ── 知識庫：Outline ──────────────────────────────────────
  # 團隊知識庫與文件協作平台
  outline:
    image: outlinewiki/outline:0.80.2
    container_name: titan-outline
    restart: unless-stopped
    # 安全強化：使用 non-root 使用者執行
    user: outline
    environment:
      # 應用程式設定
      SECRET_KEY: ${OUTLINE_SECRET_KEY:?OUTLINE_SECRET_KEY is required}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET:?OUTLINE_UTILS_SECRET is required}
      URL: ${OUTLINE_URL:-http://localhost:3001}
      PORT: 3000
      # 資料庫連線
      DATABASE_URL: postgres://${POSTGRES_USER:-titan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-titan}
      DATABASE_CONNECTION_POOL_MIN: 1
      DATABASE_CONNECTION_POOL_MAX: 5
      # Redis 連線
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # 物件儲存（MinIO S3 相容）
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${MINIO_REGION:-us-east-1}
      AWS_S3_UPLOAD_BUCKET_URL: http://minio:9000
      AWS_S3_UPLOAD_BUCKET_NAME: ${OUTLINE_S3_BUCKET:-outline}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # 認證設定（預設使用 email/密碼）
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI:-}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI:-}
      OIDC_USERNAME_CLAIM: ${OIDC_USERNAME_CLAIM:-email}
      # 郵件設定（選用，SMTP）
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@titan.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      # 其他設定
      NODE_ENV: production
      ENABLE_UPDATES: "false"       # 隔離網路不自動更新
      WEB_CONCURRENCY: 1
      MAXIMUM_IMPORT_SIZE: 5120000
      LOG_LEVEL: ${OUTLINE_LOG_LEVEL:-info}
      FORCE_HTTPS: "false"
    volumes:
      - outline-data:/var/lib/outline/data
    # 安全強化：移除外部端口，僅允許內部網路訪問
    # ports:
    #   - "${OUTLINE_PORT:-3001}:3000"
    networks:
      - titan-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # 安全強化：Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 統一儀表板：Homepage ─────────────────────────────────
  # 集中呈現所有 TITAN 服務連結與狀態
  # ── Docker Socket Proxy（Issue #183）──────────────────────
  # 安全強化：Homepage 不再直接掛載 Docker socket
  # 僅暴露容器狀態查詢（GET /containers），阻擋所有寫入操作
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    container_name: titan-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1     # allow GET /containers
      SERVICES: 0
      TASKS: 0
      NETWORKS: 0
      NODES: 0
      POST: 0           # block all POST (no container create/start/stop)
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 1
      PLUGINS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - titan-internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  homepage:
    image: gethomepage/homepage:v0.9.13
    container_name: titan-homepage
    restart: unless-stopped
    environment:
      PUID: ${HOMEPAGE_PUID:-1000}
      PGID: ${HOMEPAGE_PGID:-1000}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-localhost}
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ./config/homepage:/app/config      # 服務設定檔
      # Issue #183: Docker socket 不再直接掛載，改用 socket proxy
    # 安全強化：保留外部端口供外部存取
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    networks:
      - titan-internal
      - titan-external
    depends_on:
      - outline
      - minio
      - docker-socket-proxy
    # 安全強化：Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 監控儀表板：Uptime Kuma ──────────────────────────────
  # 服務可用性監控與狀態頁面
  # 版本固定：louislam/uptime-kuma:1.23.13
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.13
    container_name: titan-uptime-kuma
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - uptime-kuma-data:/app/data
      # Issue #183: Docker socket 移除，改用 socket proxy
    ports:
      - "${UPTIME_KUMA_PORT:-3002}:3001"
    networks:
      - titan-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/entry-page || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── TITAN Next.js App（Issue #185）────────────────────────
  # IT 團隊工作管理系統主應用
  titan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-titan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-titan}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${TITAN_URL:-https://titan.bank.local/titan}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NODE_ENV: production
    # 安全強化：移除外部端口，僅透過 Nginx 反向代理存取
    # ports:
    #   - "3000:3000"
    networks:
      - titan-internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 專案管理：Plane ──────────────────────────────────────
  # ⚠️  Plane 採用獨立 docker-compose 部署，請參閱下列文件：
  #     - 部署指南：docs/plane-setup.md
  #     - 環境變數：config/plane/.env.example
  #     - 快速啟動：config/plane/README.md
  #
  # Plane 架構包含以下容器（透過獨立 compose 管理）：
  #   plane-proxy   — Nginx 反向代理（對外入口，:8082）
  #   plane-web     — Next.js 前端（makeplane/plane-frontend）
  #   plane-api     — Django REST API（makeplane/plane-backend）
  #   plane-worker  — Celery 非同步 Worker（makeplane/plane-backend）
  #   plane-beat    — Celery Beat 排程（makeplane/plane-backend）
  #   plane-migrator— 資料庫 Migration（初始化時執行）
  #
  # 整合 TITAN 基礎設施：
  #   - 資料庫：使用 titan-postgres（需建立 plane_db）
  #   - 快取：使用 titan-redis（DB 1，避免與 Outline 的 DB 0 衝突）
  #   - 物件儲存：使用 titan-minio（bucket: plane-uploads）
  #   - 網路：加入 titan-internal（必要時由獨立 compose 掛載 external network）
  #
  # 啟動方式：
  #   docker compose -f /opt/titan/plane-docker-compose.yml \
  #     --env-file config/plane/.env up -d
  #
  # 存取入口：http://<SERVER_IP>:${PLANE_PORT:-8082}

# ═══════════════════════════════════════════════════════════
# 具名 Volume（持久化資料）
# ═══════════════════════════════════════════════════════════
volumes:
  postgres-data:
    name: titan-postgres-data
  redis-data:
    name: titan-redis-data
  minio-data:
    name: titan-minio-data
  outline-data:
    name: titan-outline-data
  uptime-kuma-data:
    name: titan-uptime-kuma-data

# ═══════════════════════════════════════════════════════════
# 網路設定：強化隔離
# ═══════════════════════════════════════════════════════════
networks:
  # 內部網路：僅允許服務間通訊，不對外開放（Issue #186）
  # internal: true 阻止容器直接訪問外部網路
  # DNS 解析由 Docker 內建 DNS (127.0.0.11) 提供，不需外部 DNS
  titan-internal:
    name: titan-internal
    driver: bridge
    internal: true
  # 外部網路：允許對外服務（Homepage）
  titan-external:
    name: titan-external
    driver: bridge
