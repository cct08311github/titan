# TITAN 監控配置 — Prometheus 統一收集
# 任務: T18 — 日誌與監控建置
# 說明：為封閉網路環境設計的監控堆疊
# 注意：所有映象版本已固定，適合離線部署
# 改動後執行：docker compose up -d

version: '3.8'

services:

  # ── 指標收集：Prometheus ─────────────────────────────────
  # 時間序列資料庫，儲存所有監控指標
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: titan-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'      # 資料保留 15 天
      - '--storage.tsdb.retention.size=10GB'     # 或 10GB
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'                 # 支援熱重載
    volumes:
      - ./config/monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - titan-internal
    depends_on:
      - node-exporter
      - cadvisor
      - postgres-exporter
      - redis-exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 主機層監控：node-exporter ──────────────────────────────
  # 收集主機層面的 CPU、RAM、Disk、Network 等指標
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: titan-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    networks:
      - titan-internal
    pid: host                                         # 需存取主機 PID 空間
    environment:
      NODE_EXPORTER_DISABLE_CHMOD: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 容器監控：cAdvisor ────────────────────────────────────
  # 收集 Docker 容器層面的資源使用指標
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: titan-cadvisor
    restart: unless-stopped
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl'
      - '--store_container_labels=false'
      - '--docker_root_dir=/var/lib/docker'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /sys:/sys:ro
      - /dev/mapper/:/dev/mapper:ro
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    networks:
      - titan-internal
    pid: host
    environment:
      CADVISOR_DISABLE_CHROOT: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── PostgreSQL 監控：postgres-exporter ────────────────────
  # 收集 PostgreSQL 查詢效能、連線數、緩衝區等指標
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: titan-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-titan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-titan}?sslmode=disable"
    volumes:
      - ./config/monitoring/postgres-queries.yaml:/config/queries.yaml:ro
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    networks:
      - titan-internal
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis 監控：redis-exporter ─────────────────────────────
  # 收集 Redis 記憶體使用、鍵數量、效能等指標
  redis-exporter:
    image: oliver006/redis_exporter:v1.54.0
    container_name: titan-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - titan-internal
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 告警管理：Alertmanager ────────────────────────────────
  # 處理 Prometheus 告警的路由、抑制、安靜處理
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: titan-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./config/monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - titan-internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 視覺化儀表板：Grafana ────────────────────────────────
  # 指標視覺化與儀表板呈現
  grafana:
    image: grafana/grafana:10.2.3
    container_name: titan-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana_password}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3030}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
    volumes:
      - ./config/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    networks:
      - titan-internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 服務可達性監控：Uptime Kuma ──────────────────────────
  # HTTP/TCP/Ping/DNS 等主動式健康檢查
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.13
    container_name: titan-uptime-kuma
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Taipei
    volumes:
      - ./config/monitoring/uptime-kuma:/app/data
    ports:
      - "${UPTIME_KUMA_PORT:-3031}:3001"
    networks:
      - titan-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ═══════════════════════════════════════════════════════════
# 具名 Volume
# ═══════════════════════════════════════════════════════════
volumes:
  prometheus-data:
    name: titan-prometheus-data
  alertmanager-data:
    name: titan-alertmanager-data
  grafana-data:
    name: titan-grafana-data

# ═══════════════════════════════════════════════════════════
# 網路設定
# ═══════════════════════════════════════════════════════════
networks:
  titan-internal:
    name: titan-internal
    external: true
