version: "3.9"

# TITAN Next.js App — 開發環境
# 用途：本機開發，含 PostgreSQL + Redis + Next.js dev server
# 使用方式：docker compose -f docker-compose.dev.yml up -d

services:
  # ── PostgreSQL 16 ──────────────────────────────────────
  titan-db:
    image: postgres:16-alpine
    container_name: titan-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan_dev_password
      POSTGRES_DB: titan_dev
    ports:
      - "5433:5432"   # 避免與本機 5432 衝突
    volumes:
      - titan-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan -d titan_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (Issue #178) ─────────────────────────────
  titan-redis:
    image: redis:7-alpine
    container_name: titan-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"   # Expose to host for local dev
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # NOTE: Next.js dev server runs on the HOST (not in Docker)
  # to avoid Prisma engine binary mismatch issues on ARM Mac.
  # Start with: npm run dev -- -p 3100
  # Or use the start-dev.sh script.

volumes:
  titan-db-data:
    name: titan-db-data-dev
