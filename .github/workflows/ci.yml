name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: titan
          POSTGRES_PASSWORD: titan_test
          POSTGRES_DB: titan_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit + Integration tests
        run: npx jest --forceExit --coverage
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - name: Build Next.js app (produces .next/standalone for Dockerfile COPY)
        run: npm run build
        env:
          DATABASE_URL: postgresql://titan:dummy@localhost:5432/titan_dummy
          NEXTAUTH_SECRET: ci-docker-build-secret
          NEXTAUTH_URL: http://localhost:3100
          AUTH_SECRET: ci-docker-build-secret

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: titan:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Security audit — FAIL on high severity
        run: npm audit --audit-level=high

      - name: Security audit — warn on moderate
        run: npm audit --audit-level=moderate || true

      - name: Check for outdated critical packages
        run: npm outdated --long || true

      - name: Verify Auth.js version is pinned (no caret/tilde)
        run: |
          AUTHJS_VERSION=$(node -e "console.log(require('./package.json').dependencies['next-auth'])")
          FIRST_CHAR="${AUTHJS_VERSION:0:1}"
          if [[ "$FIRST_CHAR" == "^" ]] || [[ "$FIRST_CHAR" == "~" ]]; then
            echo "::error::next-auth version must be pinned (no ^ or ~). Current: $AUTHJS_VERSION"
            echo "See docs/auth-upgrade-sop.md for upgrade procedure."
            exit 1
          fi
          echo "next-auth version pinned: $AUTHJS_VERSION ✓"

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
          wait-for-processing: false

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: titan
          POSTGRES_PASSWORD: titan_test
          POSTGRES_DB: titan_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test

      - name: Seed database
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3100
          AUTH_SECRET: test-secret-for-ci

      - name: Start server and run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3100/api/health --timeout 60000
          npx playwright test --project=chromium --workers=1
        env:
          DATABASE_URL: postgresql://titan:titan_test@localhost:5432/titan_test
          REDIS_URL: redis://localhost:6379/0
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3100
          AUTH_TRUST_HOST: "true"
          AUTH_SECRET: test-secret-for-ci
          PORT: 3100
          BASE_URL: http://localhost:3100
          CRON_SECRET: ci-cron-secret
          NODE_ENV: test
          E2E_TESTING: "true"

      - name: Upload test results (screenshots + traces)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14
