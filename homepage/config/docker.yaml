# 銀行 IT 團隊 - Homepage 設定
# 統一入口配置

logo: ""
title: "銀行 IT 團隊 協作平台"

header:
  title: "銀行 IT 團隊"
  icon: "mdi:shield-check"

bookmarks:
  - name: "協作工具"
    icon: "mdi:toolbox"
    items:
      - name: "任務管理 (Plane)"
        href: "/plane/"
        icon: "mdi:checkbox-marked-circle-outline"
        description: "專案追蹤與任務分配"
      - name: "知識庫 (Outline)"
        href: "/wiki/"
        icon: "mdi:book-open-variant"
        description: "團隊文件與知識累積"
      - name: "程式碼 (Gitea)"
        href: "/code/"
        icon: "mdi:source-code"
        description: "程式碼版本管理"

  - name: "自動化"
    icon: "mdi:robot"
